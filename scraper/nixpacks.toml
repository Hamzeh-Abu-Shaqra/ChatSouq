[phases.setup]
nixPkgs = ["python311", "gcc", "libffi", "openssl", "chromium", "nss", "nspr", "atk", "cups", "libdrm", "dbus", "libxkbcommon", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "mesa", "expat", "alsa-lib"]

[phases.install]
cmds = ["python3 -m pip install -r requirements.txt", "python3 -m playwright install chromium --with-deps"]

[start]
cmd = "python main.py"
